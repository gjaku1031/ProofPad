name: ProofPad
options:
  bundleIdPrefix: com.ken
  deploymentTarget:
    macOS: "13.0"
  developmentLanguage: en
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
    CLANG_WARN_DOCUMENTATION_COMMENTS: NO
    ENABLE_DEBUG_DYLIB: "NO"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1

targets:
  ProofPad:
    type: application
    platform: macOS
    sources:
      - path: ProofPad
        excludes:
          - "Info.plist"
    info:
      path: ProofPad/Info.plist
      properties:
        CFBundleName: $(PRODUCT_NAME)
        CFBundleDisplayName: ProofPad
        CFBundleIdentifier: $(PRODUCT_BUNDLE_IDENTIFIER)
        CFBundleShortVersionString: "0.1.9"
        CFBundleVersion: "10"
        CFBundlePackageType: APPL
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSPrincipalClass: NSApplication
        NSHighResolutionCapable: true
        NSRecentDocumentsLimit: 20
        SUFeedURL: https://github.com/gjaku1031/ProofPad/releases/latest/download/appcast.xml
        SUPublicEDKey: XzfmQIbJIzogbylFZxrTVmAGqgdBjj0K5XfX1+2dksU=
        CFBundleDocumentTypes:
          - CFBundleTypeName: PDF Document
            CFBundleTypeRole: Editor
            LSItemContentTypes: [com.adobe.pdf]
            LSHandlerRank: Alternate
            NSDocumentClass: PDFInkDocument
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ken.proofpad
        PRODUCT_NAME: ProofPad
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_ENTITLEMENTS: ProofPad/ProofPad.entitlements
        DEVELOPMENT_TEAM: ""
        ENABLE_HARDENED_RUNTIME: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Sparkle
        product: Sparkle

  ProofPadTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ProofPadTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ken.proofpad.tests
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "-"
        DEVELOPMENT_TEAM: ""
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ProofPad

schemes:
  ProofPad:
    build:
      targets:
        ProofPad: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ProofPadTests
    archive:
      config: Release
